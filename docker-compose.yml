services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pager}
      POSTGRES_USER: ${POSTGRES_USER:-pager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pager} -d ${POSTGRES_DB:-pager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["self-host"]
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  pager-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pager}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-pager}
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CUDA_VISIBLE_DEVICES=
      - TRANSFORMERS_NO_CUDA=1
      - TOKENIZERS_PARALLELISM=false
      - HF_HOME=/data/hf_cache
      - TRANSFORMERS_CACHE=/data/hf_cache
    volumes:
      - hf_cache:/data/hf_cache
    ports:
      - "${MCP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  pager-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pager}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-pager}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - HF_HOME=/data/hf_cache
      - TRANSFORMERS_CACHE=/data/hf_cache
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - hf_cache:/data/hf_cache
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - pager-mcp
      - pager-dashboard
    restart: unless-stopped

  keepalive:
    build:
      context: .
      dockerfile: Dockerfile.keepalive
    environment:
      - PUBLIC_URL=${PUBLIC_URL:-https://pager.duckdns.org}
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 5G
    profiles: ["production"]
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  hf_cache:
  ollama_data:
  caddy_data:
  caddy_config:
