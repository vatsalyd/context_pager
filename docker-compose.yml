version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pager
      POSTGRES_USER: pager
      POSTGRES_PASSWORD: password
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pager -d pager"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    profiles: ["self-host"]
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  pager-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    environment:
      - DATABASE_URL=postgresql://pager:password@postgres:5432/pager
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - LOG_LEVEL=INFO
      - CUDA_VISIBLE_DEVICES=
      - TRANSFORMERS_NO_CUDA=1
      - TOKENIZERS_PARALLELISM=false
      - HF_HOME=/data/hf_cache
      - TRANSFORMERS_CACHE=/data/hf_cache
    volumes:
      - hf_cache:/data/hf_cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G

  pager-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    environment:
      - DATABASE_URL=postgresql://pager:password@postgres:5432/pager
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-change-me
      - HF_HOME=/data/hf_cache
      - TRANSFORMERS_CACHE=/data/hf_cache
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - hf_cache:/data/hf_cache
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - pager-mcp
      - pager-dashboard

  keepalive:
    build:
      context: .
      dockerfile: Dockerfile.keepalive
    environment:
      - PUBLIC_URL=https://pager.duckdns.org
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 5G

volumes:
  pg_data:
  redis_data:
  hf_cache:
  ollama_data:
  caddy_data:
  caddy_config: